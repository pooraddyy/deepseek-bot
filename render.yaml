services:
  - type: web
    name: multigpt-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: AUTH_TOKEN
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: PORT
        value: "8000"
